<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pricing Cards</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, grey, grey);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        display: flex;
        gap: 20px;
      }

      .card {
        background: white;
        padding: 20px;
        width: 250px;
        text-align: center;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);

        /* Animation */
        transition: all 0.3s ease;
      }

      .card:hover {
        transform: scale(1.05);
      }

      .card h2 {
        margin-bottom: 10px;
      }

      .price {
        font-size: 28px;
        color: black;
        margin: 10px 0;
      }

      .features {
        list-style: none;
        padding: 0;
      }

      .features li {
        margin: 10px 0;
      }

      button {
        margin-top: 15px;
        padding: 10px 20px;
        border: none;
        background: #2a5298;
        color: white;
        border-radius: 5px;
        cursor: pointer;
      }

      /* Highlighted Card */
      .highlight {
        background: #2a5298;
        color: white;
        transform: scale(1.1);
      }

      .highlight button {
        background: rgb(255, 255, 255);
        color: #2a5298;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- Basic -->
      <div class="card">
        <h2>Basic</h2>
        <p class="price">Rs.550/month</p>
        <ul class="features">
          <li>1 User</li>
          <li>5 GB Storage</li>
          <li>Email Support</li>
        </ul>
        <button>Choose Plan</button>
      </div>

      <!-- Standard (Highlighted) -->
      <div class="card highlight">
        <h2>Standard</h2>
        <p class="price">Rs.450/month</p>
        <ul class="features">
          <li>5 Users</li>
          <li>50 GB Storage</li>
          <li>Priority Support</li>
        </ul>
        <button>Choose Plan</button>
      </div>

      <!-- Premium -->
      <div class="card">
        <h2>Premium</h2>
        <p class="price">Rs.870/month</p>
        <ul class="features">
          <li>Unlimited Users</li>
          <li>200 GB Storage</li>
          <li>24/7 Support</li>
        </ul>
        <button>Choose Plan</button>
      </div>
    </div>
  </body>
</html>
